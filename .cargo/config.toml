[env]
# ONNX Runtime dynamic library is loaded programmatically via ort::init_from()
# in vad/silero.rs with the correct platform-specific filename. Do NOT set
# ORT_DYLIB_PATH here — Cargo [env] doesn't support per-target values and
# a hardcoded filename breaks cross-platform builds.
